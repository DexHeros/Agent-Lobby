# DexHero — self-service lobby registration.
#
# Ships in DexHeros/Lobby-Default. When a user forks the repo directly on
# GitHub and pushes (after committing a signed .dexhero/owner.json), this
# workflow tells the DexHero platform to bind the fork to their wallet, so
# it goes live at https://dexhero.com/lobby/<wallet>/.
#
# No secrets required — the request body is public and the ownership proof
# is read by the platform from .dexhero/owner.json in the repo itself.
#
# Note: GitHub disables Actions on new forks by default. Open the "Actions"
# tab once and click "I understand my workflows, go ahead and enable them".

name: DexHero Lobby Register

on:
  push:
    branches: [ main ]

# Defaults to the production zone (dexhero.com). Override with a repo
# variable DEXHERO_PLATFORM only for staging.
env:
  PLATFORM: ${{ vars.DEXHERO_PLATFORM || 'https://dexhero.com' }}

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pushed commit
        uses: actions/checkout@v4

      - name: Register fork with DexHero
        run: |
          set -euo pipefail
          if [ ! -f .dexhero/owner.json ]; then
            echo "No .dexhero/owner.json yet — nothing to register."
            echo "Run tools/sign-owner.mjs and commit .dexhero/owner.json to go live."
            exit 0
          fi
          # Identify ourselves as a well-behaved bot (Googlebot-style token).
          # The platform's edge (Cloudflare) drops the bare curl/* UA; a
          # descriptive Mozilla-compatible UA is the conventional way for a
          # legitimate automated client to pass. The durable fix is a WAF
          # "skip" rule for this path on the dexhero.com zone.
          UA='Mozilla/5.0 (compatible; DexHeroLobbyRegister/1.0; +https://dexhero.com)'
          body="{\"repo_full_name\":\"${GITHUB_REPOSITORY}\",\"head_sha\":\"${GITHUB_SHA}\"}"
          echo "Registering ${GITHUB_REPOSITORY}@${GITHUB_SHA} with ${PLATFORM} …"
          attempt=1; max=5; code=000
          while [ "$attempt" -le "$max" ]; do
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' --max-time 30 \
              -X POST "${PLATFORM}/api/lobby/register-fork" \
              -A "$UA" -H 'content-type: application/json' -d "$body" || echo 000)
            echo "attempt ${attempt}: HTTP ${code}"
            # 200 = done. Real client errors (400/401/409/422) won't fix
            # themselves — stop. Retry transient edge/server hiccups only.
            case "$code" in
              200) break ;;
              403|408|429|5*|000) : ;;
              4*) break ;;
            esac
            attempt=$((attempt + 1)); sleep $((attempt * 3))
          done
          cat /tmp/resp.json 2>/dev/null || true; echo
          if [ "$code" != "200" ]; then
            echo "::error::Registration failed (HTTP ${code}). See response above."
            exit 1
          fi
          echo "::notice::Lobby is live — ${PLATFORM}/lobby/$(jq -r .wallet /tmp/resp.json)/"
